<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>المساعد الذكي للمعاملات المالية الإسلامية</title>

    <!-- Arabic Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- ================= Header ================= -->
    <header class="app-header">
        <div class="header-content">

            <div class="brand">

                <span class="brand-icon" aria-hidden="true">
                    <!-- Islamic Star Icon -->
                    <svg viewBox="0 0 100 100" width="34" height="34">
                        <g fill="none" stroke="currentColor" stroke-width="3">
                            <polygon points="50,6 61,34 90,34 66,52 76,80 50,62 24,80 34,52 10,34 39,34"/>
                        </g>
                    </svg>
                </span>

                <div class="brand-text">
                    <h1>معاملات AI</h1>
                    <p class="subtitle">
                        اسأل عن الأحكام الشرعية المتعلقة بالمعاملات المالية الإسلامية
                    </p>
                </div>

            </div>

        </div>
    </header>

    <!-- ================= Chat Area ================= -->
    <main class="chat-shell">

        <div
            class="chat-window"
            id="chatWindow"
            role="log"
            aria-live="polite">

            <!-- Welcome Message -->
            <div class="message assistant-message">

                <div class="avatar assistant-avatar" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M12 2 15 9 22 10 17 15 18 22 12 18.5 6 22 7 15 2 10 9 9 12 2Z"/>
                    </svg>
                </div>

                <div class="bubble">
    🌙 السلام عليكم ورحمة الله وبركاته<br>
    مرحبًا بك في <strong>معاملات AI</strong>.<br>
    أنا مساعدك الذكي المتخصص في المعاملات المالية الإسلامية،
    تفضل بطرح سؤالك وسأجيبك بإذن الله.
</div>

            </div>

        </div>

        <!-- Typing Indicator -->
        <div
            class="typing-indicator"
            id="typingIndicator"
            hidden>

            <div class="avatar assistant-avatar" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M12 2 15 9 22 10 17 15 18 22 12 18.5 6 22 7 15 2 10 9 9 12 2Z"/>
                </svg>
            </div>

            <div class="bubble typing-bubble">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

        </div>

        <!-- Composer -->
        <form
            id="composerForm"
            class="composer"
            autocomplete="off">

            <input
                id="questionInput"
                class="composer-input"
                type="text"
                maxlength="1000"
                required
                placeholder="اكتب سؤالك هنا..."
                aria-label="Question Input">

            <button
                id="sendBtn"
                class="send-btn"
                type="submit"
                aria-label="Send">

                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M3 12 21 4 14 21 11 13 3 12Z"/>
                </svg>

            </button>

        </form>

    </main>

    <!-- JavaScript -->
    <script src="/static/script.js"></script>

</body>
</html>
